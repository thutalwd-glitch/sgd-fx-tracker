name: Weekly SGD FX Report Update

on:
  schedule:
    - cron: "0 1 * * 1"   # Every Monday 9am Singapore time (1am UTC)
  workflow_dispatch:        # Also allows manual trigger from GitHub

jobs:
  update-report:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # Required to push output files back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run SGD FX Analyser
        run: python main.py

      - name: Commit updated report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Auto-update: SGD FX report $(date +'%Y-%m-%d')"
          git push origin HEAD:master
